name: argiope
base: core22
version: 0.2.3
summary: A web crawler for broken-link detection and image downloading
description: |
  argiope crawls websites to detect broken links and download images.
  It supports configurable crawl depth, request timeouts, and rate limiting.
  Images can be saved to an organized directory structure for archiving websites.

  MangaFox support: pass a fanfox.net manga URL to the 'images' command to
  download chapter pages organized as [manga]/[chapter]/[page].jpg, with
  optional chapter range filtering via --chapters N-M.

grade: stable
confinement: strict

apps:
  argiope:
    command: bin/argiope
    plugs:
      - home
      - network
      - removable-media

parts:
  zig:
    plugin: nil
    build-packages:
      - curl
      - xz-utils
    override-build: |
      snap install zig --classic --beta

  argiope:
    after: [zig]
    plugin: nil
    source: .
    override-build: |
      export PATH="$SNAPCRAFT_STAGE/zig:$PATH"
      zig build -Doptimize=ReleaseFast
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp zig-out/bin/argiope $SNAPCRAFT_PART_INSTALL/bin/
