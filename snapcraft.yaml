name: argiope
base: core22
version: 0.1.0
summary: A web crawler for broken-link detection and image downloading
description: |
  argiope crawls websites to detect broken links and download images.
  It supports configurable crawl depth, request timeouts, and rate limiting.
  Images can be saved to an organized directory structure for archiving websites.

grade: stable
confinement: strict

apps:
  argiope:
    command: bin/argiope
    plugs:
      - home
      - network
      - removable-media

parts:
  zig:
    plugin: dump
    # Using a recent dev build because 0.15.2 stable URL was not found/available.
    # Update this to a stable release URL when available.
    source: https://ziglang.org/builds/zig-x86_64-linux-0.16.0-dev.2682+02142a54d.tar.xz
    organize:
      zig-x86_64-linux-0.16.0-dev.2682+02142a54d: zig

  argiope:
    after: [zig]
    plugin: nil
    source: .
    override-build: |
      export PATH="$SNAPCRAFT_STAGE/zig:$PATH"
      zig build -Doptimize=ReleaseFast
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp zig-out/bin/argiope $SNAPCRAFT_PART_INSTALL/bin/
